<!doctype html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Cverde Agro E-commerce{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom mb-3">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
        <img src="{% static 'images/logo.png' %}" alt="Cverde" class="me-2 logo-img">
        Cverde
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="#navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/">Início</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'products:list' %}">Produtos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'users:profile' %}">Minha Conta</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-success fw-semibold" href="{% url 'users:producer_panel' %}">Painel Produtor</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a class="text-decoration-none text-dark" href="{% url 'users:profile' %}">👤</a>
          <a class="text-decoration-none text-dark" href="{% url 'orders:cart' %}">🛒</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
