{% load static %}

<nav class="navbar navbar-expand-lg coverde-navbar sticky-top">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand coverde-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
            <img src="{% static 'products/logo.png' %}" alt="COVERDE" height="38">
            <span class="brand-text">COVERDE</span>
        </a>

        <!-- Mobile button -->
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Abrir menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <!-- Main links -->
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}"
                       href="{% url 'home' %}">
                        Início
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/produtos/' in request.path %}active{% endif %}"
                       href="{% url 'products:list' %}">
                        Produtos
                    </a>
                </li>

            </ul>

            <!-- Search only desktop -->
            <form class="coverde-search d-none d-lg-flex me-3"
                  action="{% url 'products:list' %}"
                  method="get"
                  role="search">
                <div class="input-group input-group-sm">
                    <input type="search"
                           name="q"
                           class="form-control"
                           placeholder="Pesquisar produtos..."
                           aria-label="Pesquisar produtos">
                    <button class="btn btn-outline-success" type="submit">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </div>
            </form>

            <!-- Right actions -->
            <div class="d-flex align-items-center gap-2">

                <!-- Cart -->
                <a class="btn btn-light position-relative coverde-cart-btn"
                   href="{% url 'orders:cart' %}"
                   aria-label="Carrinho">
                    <i class="fa-solid fa-cart-shopping"></i>

                    {% if cart_count %}
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">
                            {{ cart_count }}
                        </span>
                    {% endif %}
                </a>

                {% if request.user.is_authenticated %}

                    <!-- User dropdown -->
                    <div class="dropdown">
                        <button class="btn btn-coverde-outline dropdown-toggle"
                                type="button"
                                id="userDropdown"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                            <i class="fa-solid fa-user me-1"></i>
                            {{ request.user.get_short_name|default:request.user.username }}
                        </button>

                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">

                            <li>
                                <a class="dropdown-item" href="{% url 'users:profile' %}">
                                    <i class="fa-solid fa-id-card me-2"></i>
                                    Perfil
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item" href="{% url 'users:orders' %}">
                                    <i class="fa-solid fa-bag-shopping me-2"></i>
                                    Minhas encomendas
                                </a>
                            </li>

                            <li><hr class="dropdown-divider"></li>

                            <li>
                                <a class="dropdown-item text-danger" href="{% url 'users:logout' %}">
                                    <i class="fa-solid fa-right-from-bracket me-2"></i>
                                    Sair
                                </a>
                            </li>

                        </ul>
                    </div>

                {% else %}

                    <!-- Login only -->
                    <a href="{% url 'users:login' %}" class="btn btn-coverde">
                        <i class="fa-solid fa-right-to-bracket me-1"></i>
                        Entrar
                    </a>

                {% endif %}

            </div>
        </div>
    </div>
</nav>
