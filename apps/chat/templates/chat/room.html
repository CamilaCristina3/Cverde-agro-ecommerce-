{% extends "base.html" %}
{% block title %}{{ room.title|default:room.name }} | Chat{% endblock %}

{% block content %}
<section class="section">
  <div class="level">
    <div class="level-left">
      <div>
        <h1 class="title is-4">
          <span class="icon"><i class="fas fa-comments"></i></span>
          <span>{{ room.title|default:room.name }}</span>
        </h1>
        <p class="subtitle is-6 has-text-grey">Sala: #{{ room.name }}</p>
      </div>
    </div>
    <div class="level-right">
      <a class="button is-light" href="{% url 'chat:index' %}">
        <span class="icon"><i class="fas fa-arrow-left"></i></span>
        <span>Voltar</span>
      </a>
    </div>
  </div>

  <div class="box" style="height: 55vh; overflow:auto;" id="chat-log"></div>

  <div class="box">
    <div class="field has-addons">
      <div class="control is-expanded">
        <input class="input" id="chat-message-input" placeholder="Escreve uma mensagem..." autocomplete="off">
      </div>
      <div class="control">
        <button class="button is-link" id="chat-message-submit">
          <span class="icon"><i class="fas fa-paper-plane"></i></span>
          <span>Enviar</span>
        </button>
      </div>
    </div>
    <p class="help has-text-grey">Enter para enviar.</p>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
  (function () {
    const roomName = "{{ room.name|escapejs }}";
    const log = document.getElementById("chat-log");
    const input = document.getElementById("chat-message-input");
    const button = document.getElementById("chat-message-submit");

    function appendLine(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    const scheme = (window.location.protocol === "https:") ? "wss" : "ws";
    const socket = new WebSocket(`${scheme}://${window.location.host}/ws/chat/${roomName}/`);

    socket.onmessage = function (e) {
      const data = JSON.parse(e.data);
      if (data.type === "history") {
        for (const msg of data.messages) {
          appendLine(`<p><strong>${msg.username}</strong> <small class="has-text-grey">${msg.timestamp}</small><br>${msg.content}</p>`);
        }
        return;
      }
      if (data.type === "message") {
        appendLine(`<p><strong>${data.username}</strong> <small class="has-text-grey">${data.timestamp}</small><br>${data.content}</p>`);
        return;
      }
    };

    socket.onclose = function () {
      appendLine('<p class="has-text-danger">Ligação encerrada.</p>');
    };

    function sendMessage() {
      const message = (input.value || "").trim();
      if (!message) return;
      socket.send(JSON.stringify({message}));
      input.value = "";
      input.focus();
    }

    button.addEventListener("click", sendMessage);
    input.addEventListener("keyup", function (e) {
      if (e.key === "Enter") sendMessage();
    });
    input.focus();
  })();
</script>
{% endblock %}
